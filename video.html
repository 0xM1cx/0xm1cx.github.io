<html>
  <head>
    <title>This is for you</title>
    
    <script> 
      var myVideo = document.getElementById("video1"); 
      
      function playPause() { 
        if (myVideo.paused) 
          myVideo.play(); 
        else 
          myVideo.pause(); 
      } 
      
      function makeBig() { 
          myVideo.width = 2000; 
      } 
      
      function makeSmall() { 
          myVideo.width = 320; 
      } 
      
      function makeNormal() { 
          myVideo.width = 1000; 
      } 
      </script>
  </head>
  

    <div style="text-align:center">

      <button onclick="playPause()">Play/Pause</button> 
      <button onclick="makeBig()">Big</button>
      <button onclick="makeSmall()">Small</button>
      <button onclick="makeNormal()">Normal</button>
      <br><br>
      <video id="video1" width="1000" autoplay>
        <source src="./static/crush.mp4" type="video/mp4">
        <source src="./static/crush.ogg" type="video/ogg">
        Your browser does not support HTML video.
      </video>

    </div>

</html>
